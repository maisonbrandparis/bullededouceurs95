<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci ! — Bulle de Douceur</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Figtree:wght@400;600&family=Ms+Madi&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Figtree',sans-serif;background:linear-gradient(160deg,#FDF9F6,#F3DFE0);min-height:100svh;display:grid;place-items:center;color:#4A3A3C;text-align:center;padding:24px}
.carte{background:#fff;border-radius:36px;padding:56px 42px;max-width:480px;box-shadow:0 26px 70px rgba(168,98,111,.18);border:1px solid rgba(196,129,140,.16)}
.script{font-family:'Ms Madi',cursive;color:#C4818C;font-size:2.6rem;display:block;margin-bottom:8px}
h1{font-family:'Fraunces',serif;font-weight:500;font-size:1.9rem;margin:0 0 16px}
p{color:#8C7376;line-height:1.65;margin:0 0 28px}
a.btn{display:inline-block;background:#C4818C;color:#fff;text-decoration:none;padding:14px 30px;border-radius:999px;font-weight:600}
a.btn:hover{background:#A8626F}
.bulle{font-size:2.4rem}
</style>
</head>
<body>
<div class="carte">
  <span class="bulle">🫧</span>
  <span class="script">Merci !</span>
  <h1>Votre demande est bien envoyée</h1>
  <p>Sabrine vous recontacte très vite pour fixer ensemble votre moment de douceur. À tout de suite 💗</p>
  <a class="btn" href="/">Retour au site</a>
</div>
</body>
</html>
